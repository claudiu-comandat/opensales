# Railway service configuration for @opensales/web (Next.js).
# See https://docs.railway.com/reference/config-as-code
#
# IMPORTANT — tell Railway to use THIS file for the web service:
#   Service → Settings → Config File Path → apps/web/railway.toml
#   Without that, Railway uses the root railway.toml (the API config) and
#   tries to run entrypoint.sh, which crashes because it needs DATABASE_URL.
#
# The web service does NOT need DATABASE_URL — it talks to the API over HTTP.
# Required variables (Variables tab → Raw Editor):
#   NEXT_PUBLIC_API_URL = https://${{ api.RAILWAY_PUBLIC_DOMAIN }}
#   NODE_ENV            = production

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"

[deploy]
# Explicit startCommand prevents Railway from ever falling back to entrypoint.sh
startCommand = "node apps/web/server.js"
healthcheckPath = "/"
healthcheckTimeout = 90
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
